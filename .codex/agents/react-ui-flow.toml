## Provider / Context Semantics

Do not create a Provider unless it actually provides values/actions to descendants through Context.

Flag Provider usage when:
- no Context value is provided
- no descendant consumer exists
- it only renders dialogs/toasts/notifications
- it only observes auth/state changes
- it is used as a generic global runner

Prefer:
- normal component
- layout-mounted feature component
- feature host component
- hook + component split

Do NOT use Provider as a generic “runs globally” component.

